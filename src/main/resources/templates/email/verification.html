<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证码</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #FF786E; color: white; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .code-box { background: #f8f9fa; padding: 30px; text-align: center; border-radius: 0 0 8px 8px; }
        .code { font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #FF786E; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>验证码</h2>
    </div>
    <div class="code-box">
        <p>您的验证码是：</p>
        <p class="code" th:text="${code}">123456</p>
        <p style="color: #999; font-size: 14px;">有效期 <span th:text="${expireMinutes}">5</span> 分钟，请勿泄露给他人</p>
    </div>
    <div class="footer">
        <p>此邮件由系统自动发送，请勿回复</p>
    </div>
</body>
</html>
