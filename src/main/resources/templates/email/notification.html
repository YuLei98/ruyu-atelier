<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}">通知</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #66C3A5; color: white; padding: 20px; border-radius: 8px 8px 0 0; }
        .content { background: #f8f9fa; padding: 20px; border-radius: 0 0 8px 8px; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 th:text="${title}">花哪儿了 - 通知</h2>
    </div>
    <div class="content">
        <p th:if="${username}">您好，<strong th:text="${username}">用户</strong></p>
        <p th:text="${message}">这是一条通知消息</p>
        <div th:if="${actionUrl}" style="margin-top: 20px;">
            <a th:href="${actionUrl}" style="display: inline-block; background: #66C3A5; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px;">点击查看</a>
        </div>
    </div>
    <div class="footer">
        <p>此邮件由系统自动发送，请勿回复</p>
    </div>
</body>
</html>
