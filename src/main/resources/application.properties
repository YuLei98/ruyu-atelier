spring.application.name=framework
server.port=8000

# API Access Log 配置
api-access-log.trace-id-header=X-Trace-Id
api-access-log.max-body-length=1000
api-access-log.logger-name=apiAccessLog
api-access-log.exclude-methods=OPTIONS

# JWT 配置
jwt.secret-key=${JWT_SECRET_KEY:your-secret-key-here-change-in-production}

# redis ??
spring.data.redis.timeout=200
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:foobared}
#spring.data.redis.database=0
spring.data.redis.lettuce.pool.max-wait=300

# spring security 默认配置，实现了 UserDetailsService 后以下配置不生效
#spring.security.user.name=ruiyu
#spring.security.user.password=ruiyu123

# OAuth2 配置
oauth.acceptMediaType=application/json
oauth.authorizationScheme=Bearer
oauth.accessTokenField=access_token
oauth.errorField=error
oauth.errorDescriptionField=error_description

github.client.clientId=${GITHUB_CLIENT_ID:}
github.client.clientSecret=${GITHUB_CLIENT_SECRET:}
github.client.authorizeUrl=https://github.com/login/oauth/authorize
github.client.accessTokenUrl=https://github.com/login/oauth/access_token
github.client.redirectUrl=${GITHUB_REDIRECT_URL:http://localhost:8000/oauth/redirect}
github.client.userInfoUrl=https://api.github.com/user
github.client.provider=github
github.client.grantType=authorization_code
github.client.userIdField=id
github.client.usernameField=login
github.client.avatarUrlField=avatar_url
github.client.emailField=email


# DataSource Config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/springboot_demo?characterEncoding=utf8}
spring.datasource.username=${DATASOURCE_USERNAME:root}
spring.datasource.password=${DATASOURCE_PASSWORD:root}

